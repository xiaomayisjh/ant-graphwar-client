name: Manual Build

on:
  workflow_dispatch:
    inputs:
      clean:
        description: "Run a clean Wails build"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows amd64
            os: windows-latest
            platform: windows/amd64
            artifact: GraphwarDesktopOpen-windows-amd64
          - name: Linux amd64
            os: ubuntu-22.04
            platform: linux/amd64
            artifact: GraphwarDesktopOpen-linux-amd64
          - name: macOS amd64
            os: macos-13
            platform: darwin/amd64
            artifact: GraphwarDesktopOpen-darwin-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: python scripts/build.py --platform "${{ matrix.platform }}" ${{ inputs.clean == 'true' && '--clean' || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/**
          if-no-files-found: error
